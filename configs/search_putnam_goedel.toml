[search]
prompt_format = "goedel-v2"   # Goedel-Prover-V2 (Qwen3-8B ChatML template)
max_depth = 12                # Was 25; all Putnam proofs ≤ depth 8
alpha = 0.5                   # LLM log-prob weight
beta = 0.5                    # EBM score weight
llm_temperature = 40.4        # Scale LLM log-probs: score / temperature (~90% EBM / 10% LLM)
ebm_temperature = 1.0         # Scale EBM scores: score / temperature
timeout_per_theorem = 600     # seconds (9x baseline for deep retry)
# Goedel temperature sweet spot: 0.6-1.2 (vs DeepSeek 1.4-1.8)
temperature = 1.0             # Goedel sweet spot (vs DS 1.4)
top_p = 0.95                  # Nucleus sampling parameter
max_tactic_tokens = 96        # Goedel generates longer tactics with <;> chains (vs DS 48)
batch_encode_size = 4         # Max states per encode HTTP request (matched to server max-batch-size)
ebm_ramp_depth = 4            # EBM beta ramps 0→full over 4 depth levels
ebm_min_depth = 2             # Skip EBM inference entirely at depths 0-1
max_consecutive_have = 4      # Prune have chains ≥ 4
probe_tactics = []
# Hybrid whole-proof search (Goedel-adjusted for longer proofs)
hybrid_num_proofs = 32
hybrid_min_proofs = 2         # Was 4; keep root fanout high (from DS Putnam config)
hybrid_max_rounds = 100
# Goedel proofs are ~4x longer than DeepSeek (1836 avg chars)
hybrid_max_tokens = 2048      # Increased from 1024 to accommodate Goedel's longer proofs
hybrid_min_tokens = 512       # Increased from 256 (proportional scaling)
hybrid_tokens_decay_depth = 8
hybrid_budget = 1024          # Increased from 512 to accommodate longer Goedel proofs
# Temperature ramping for hybrid search (Goedel-specific)
hybrid_max_temperature = 1.2  # Max temperature during ramping (Goedel sweet spot, vs DS 1.8)

[lean_pool]
num_workers = 4               # Matched to concurrency default
max_requests_per_worker = 1000
max_lifetime_secs = 1800      # 30 minutes
tactic_timeout_secs = 540
