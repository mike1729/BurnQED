# pass@4 with 2048 tokens — base model search on Goedel depth>=4 theorems
# Purpose: collect search trajectories for EBM training data
[search]
max_depth = 25
alpha = 0.5
beta = 0.5
llm_temperature = 40.4
ebm_temperature = 1.0
timeout_per_theorem = 600     # 10 min per theorem
temperature = 1.0
top_p = 0.95
max_tactic_tokens = 48
batch_encode_size = 4
ebm_ramp_depth = 4
ebm_min_depth = 2
max_consecutive_have = 4
probe_tactics = []
# Single round of 4 independent full proofs at 2048 tokens
hybrid_num_proofs = 4
hybrid_min_proofs = 4         # No decay — always 4
hybrid_max_rounds = 1         # Single round = pass@4
hybrid_max_tokens = 2048
hybrid_budget = 4

[lean_pool]
num_workers = 4
max_requests_per_worker = 1000
max_lifetime_secs = 1800
tactic_timeout_secs = 540
